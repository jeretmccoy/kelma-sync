services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kelma_sync}
      POSTGRES_USER: ${POSTGRES_USER:-kelma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - kelma-sync-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kelma} -d ${POSTGRES_DB:-kelma_sync}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build: .
    restart: unless-stopped
    environment:
      PORT: "8080"
      TZ: UTC
      DATABASE_URL: postgres://${POSTGRES_USER:-kelma}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kelma_sync}?sslmode=disable
      KELMA_AUTH_MODE: ${KELMA_AUTH_MODE:-local}
      KELMA_IMMERSION_LOGIN_URL: ${KELMA_IMMERSION_LOGIN_URL:-}
      MEDIA_DIR: /data/media
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      KELMA_INTERNAL_SECRET: ${KELMA_INTERNAL_SECRET:-}
    ports:
      - "${KELMA_BIND_ADDRESS:-127.0.0.1}:${KELMA_PORT:-8080}:8080"
    volumes:
      - kelma-sync-media:/data/media
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kelma-sync-postgres:
  kelma-sync-media:
