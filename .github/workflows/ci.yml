name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kelma_sync_test
          POSTGRES_USER: kelma
          POSTGRES_PASSWORD: kelma
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U kelma -d kelma_sync_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify modules
        run: go mod verify
      - name: Test
        env:
          TEST_DATABASE_URL: postgres://kelma:kelma@localhost:5433/kelma_sync_test?sslmode=disable
        run: go test -count=1 ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/server
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Compile-check Python clients
        run: python3 -m compileall -q clients/python scripts
      - name: Test checksum helper
        run: cargo test --locked --manifest-path clients/rust/kelma-hash/Cargo.toml
